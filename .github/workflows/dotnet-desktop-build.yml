name: Build pull requests

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'tools/**'
      - '.github/**'

  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: windows-latest
    environment: sonarcloud

    steps:
    - name: Set up JDK 17
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
      with:
        java-version: 17
        distribution: 'zulu'

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup dotnet
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: 10.0.302
        cache: true
        cache-dependency-path: src/**/packages.lock.json

    - name: Cache SonarQube packages
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~\.sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarQube scanner
      id: cache-sonar-scanner
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: .\.sonar\scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner

    - name: Install SonarQube scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        New-Item -Path .\.sonar\scanner -ItemType Directory
        dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

    - name: Install coverage tool
      run: dotnet tool install --global dotnet-coverage

    - name: Build and analyze
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        # Fail fast and propagate errors to the runner
        # https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.core/about/about_preference_variables?view=powershell-7.5
        $ErrorActionPreference = "Stop"
        $PSNativeCommandUseErrorActionPreference = $true

        $scanner = Join-Path $env:GITHUB_WORKSPACE ".sonar\scanner\dotnet-sonarscanner"

        Push-Location src
        try {
          & $scanner begin /k:"alexsee_bsh3" /o:"alexsee" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml
          dotnet restore "Backup Service Home 3.sln" --locked-mode -a x64
          dotnet build "Backup Service Home 3.sln" --configuration Release --no-restore -p:Platform=x64
          dotnet-coverage collect 'dotnet test "Backup Service Home 3.sln" --configuration Release --no-build --no-restore -p:Platform=x64' -f xml -o 'coverage.xml'
          & $scanner end /d:sonar.token="$env:SONAR_TOKEN"
        }
        finally {
          Pop-Location
        }
