name: Release stable version

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:

  release:
    runs-on: windows-latest
    
    env:
      Solution_Name: src\Backup Service Home 3.sln
      Test_Project_Path: src\BSH.Test\BSH.Test.csproj

    steps:
    - name: Set env
      run: |
        $version = "${env:REF_NAME}".substring(1)
        $info_version = $version.replace('-beta', '.')
        echo "BUILD_VERSION=$version" >> $env:GITHUB_ENV
        echo "INFO_VERSION=$info_version" >> $env:GITHUB_ENV
      env:
        REF_NAME: ${{ github.ref_name }}

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup dotnet
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: 10.0.300
        cache: true
        cache-dependency-path: src/**/packages.lock.json

    - name: Restore dependencies
      run: dotnet restore "Backup Service Home 3.sln" --locked-mode -a x64
      working-directory: ./src

    - name: Build the application
      run: |
        dotnet publish -c Release -o ../output -a x64 --self-contained --no-restore /p:Version=$env:BUILD_VERSION /p:FileVersion=$env:INFO_VERSION
        rm -R ../output/*.pdb
      working-directory: ./src

    - name: Building the installer
      run: |
        iscc.exe tools\setup\Setup.iss /DApplicationVersion=$env:BUILD_VERSION /DApplicationInfoVersion=$env:INFO_VERSION

    - name: Release to GitHub
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $asset = "$env:RUNNER_WORKSPACE/bsh3/tools/setup/output/backupservicehome-${env:BUILD_VERSION}-win64.exe"
        gh release view "$env:REF_NAME" *> $null
        if ($LASTEXITCODE -eq 0) {
          gh release upload "$env:REF_NAME" "$asset" --clobber
        } else {
          gh release create "$env:REF_NAME" "$asset" --generate-notes
        }
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REF_NAME: ${{ github.ref_name }}
        RUNNER_WORKSPACE: ${{ runner.workspace }}
